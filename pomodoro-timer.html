<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>番茄钟</title>
<style>
  :root {
    --bg: #f0f2f5;
    --card: #ffffff;
    --text: #2c3e50;
    --text-secondary: #7f8c8d;
    --shadow: 0 10px 40px rgba(0,0,0,0.08);
    --focus: #e74c3c;
    --focus-light: #fce4e4;
    --short-break: #2ecc71;
    --short-break-light: #e8f8ef;
    --long-break: #3498db;
    --long-break-light: #e8f4fd;
    --ring-bg: #ecf0f1;
    --btn-bg: #f8f9fa;
    --btn-hover: #e9ecef;
    --border: #e9ecef;
    --input-bg: #f8f9fa;
    --divider: #eee;
    --tag-bg: #f0f0f0;
  }
  .dark {
    --bg: #1a1a2e;
    --card: #16213e;
    --text: #e0e0e0;
    --text-secondary: #a0a0b0;
    --shadow: 0 10px 40px rgba(0,0,0,0.3);
    --ring-bg: #2a2a4a;
    --btn-bg: #1a1a3e;
    --btn-hover: #2a2a5a;
    --border: #2a2a4a;
    --input-bg: #1a1a3e;
    --divider: #2a2a4a;
    --tag-bg: #2a2a4a;
    --focus-light: #3d1a1a;
    --short-break-light: #1a3d2a;
    --long-break-light: #1a2a3d;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.3s, color 0.3s;
    user-select: none;
  }
  .container {
    display: flex;
    gap: 24px;
    align-items: flex-start;
    max-width: 800px;
    width: 100%;
    padding: 20px;
  }
  .main-card {
    flex: 1;
    background: var(--card);
    border-radius: 24px;
    padding: 40px 48px;
    box-shadow: var(--shadow);
    text-align: center;
    transition: background 0.3s, box-shadow 0.3s;
    position: relative;
  }
  .theme-toggle {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--btn-bg);
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  .theme-toggle:hover { background: var(--btn-hover); }
  .modes {
    display: flex;
    gap: 6px;
    background: var(--btn-bg);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 32px;
  }
  .mode-btn {
    flex: 1;
    padding: 8px 12px;
    border: none;
    border-radius: 10px;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .mode-btn.active {
    background: white;
    color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .dark .mode-btn.active {
    background: #0a0a2e;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .mode-btn.focus.active { color: var(--focus); }
  .mode-btn.short.active { color: var(--short-break); }
  .mode-btn.long.active { color: var(--long-break); }
  .ring-container {
    position: relative;
    width: 280px;
    height: 280px;
    margin: 0 auto 24px;
  }
  .ring-svg {
    transform: rotate(-90deg);
    width: 280px;
    height: 280px;
  }
  .ring-bg {
    fill: none;
    stroke: var(--ring-bg);
    stroke-width: 8;
  }
  .ring-progress {
    fill: none;
    stroke: var(--focus);
    stroke-width: 8;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.3s linear, stroke 0.3s;
  }
  .timer-display {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 56px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: 2px;
    font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
  }
  .mode-label {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-top: -16px;
    margin-bottom: 24px;
  }
  .controls {
    display: flex;
    gap: 12px;
    justify-content: center;
    align-items: center;
  }
  .btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--btn-bg);
    cursor: pointer;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    color: var(--text);
  }
  .btn:hover { background: var(--btn-hover); transform: scale(1.05); }
  .btn-play {
    width: 60px;
    height: 60px;
    font-size: 24px;
    border: none;
    color: white;
  }
  .btn-play.focus-bg { background: var(--focus); }
  .btn-play.short-bg { background: var(--short-break); }
  .btn-play.long-bg { background: var(--long-break); }
  .btn-play:hover { transform: scale(1.08); filter: brightness(1.1); }
  .stats-row {
    display: flex;
    gap: 24px;
    justify-content: center;
    margin-top: 28px;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .stats-row span strong {
    color: var(--text);
    font-size: 16px;
  }
  .side-panel {
    width: 280px;
    background: var(--card);
    border-radius: 24px;
    padding: 28px 24px;
    box-shadow: var(--shadow);
    transition: background 0.3s, box-shadow 0.3s;
  }
  .side-panel h3 {
    font-size: 15px;
    margin-bottom: 16px;
    color: var(--text);
  }
  .task-input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .task-input-row input {
    flex: 1;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--input-bg);
    color: var(--text);
    font-size: 13px;
    outline: none;
    transition: border 0.2s;
  }
  .task-input-row input:focus { border-color: var(--focus); }
  .task-input-row button {
    padding: 8px 14px;
    border: none;
    border-radius: 10px;
    background: var(--focus);
    color: white;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: filter 0.2s;
  }
  .task-input-row button:hover { filter: brightness(1.1); }
  .task-list { list-style: none; max-height: 200px; overflow-y: auto; }
  .task-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid var(--divider);
    font-size: 13px;
  }
  .task-item:last-child { border-bottom: none; }
  .task-item input[type="checkbox"] {
    accent-color: var(--focus);
    cursor: pointer;
  }
  .task-item.completed span { text-decoration: line-through; color: var(--text-secondary); }
  .task-item .del-task {
    margin-left: auto;
    background: none;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 16px;
    opacity: 0.4;
    transition: opacity 0.2s;
  }
  .task-item .del-task:hover { opacity: 1; color: var(--focus); }
  .settings-section { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--divider); }
  .settings-section h3 { margin-bottom: 12px; }
  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    font-size: 13px;
  }
  .setting-row input {
    width: 60px;
    padding: 6px 8px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--input-bg);
    color: var(--text);
    text-align: center;
    font-size: 13px;
    outline: none;
  }
  .setting-row input:focus { border-color: var(--focus); }
  .shortcut-hint {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 12px;
    text-align: center;
  }
  .shortcut-hint kbd {
    background: var(--tag-bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 10px;
    border: 1px solid var(--border);
  }
  @media (max-width: 750px) {
    .container { flex-direction: column; align-items: center; }
    .side-panel { width: 100%; max-width: 400px; }
    .main-card { padding: 28px 24px; }
    .ring-container { width: 220px; height: 220px; }
    .ring-svg { width: 220px; height: 220px; }
    .timer-display { font-size: 42px; }
  }
</style>
</head>
<body>

<div class="container">
  <!-- 主卡片 -->
  <div class="main-card">
    <button class="theme-toggle" id="themeToggle" title="切换主题">☀</button>

    <!-- 模式切换 -->
    <div class="modes">
      <button class="mode-btn focus active" data-mode="focus">🎯 专注</button>
      <button class="mode-btn short" data-mode="shortBreak">☕ 短休</button>
      <button class="mode-btn long" data-mode="longBreak">🌿 长休</button>
    </div>

    <!-- 环形进度条 -->
    <div class="ring-container">
      <svg class="ring-svg" viewBox="0 0 280 280">
        <circle class="ring-bg" cx="140" cy="140" r="124"/>
        <circle class="ring-progress" id="ringProgress" cx="140" cy="140" r="124"
          stroke-dasharray="779.1" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-display" id="timerDisplay">25:00</div>
    </div>

    <div class="mode-label" id="modeLabel">准备开始专注</div>

    <!-- 控制按钮 -->
    <div class="controls">
      <button class="btn" id="btnReset" title="重置 (R)">↺</button>
      <button class="btn btn-play focus-bg" id="btnPlay" title="开始 (空格)">▶</button>
      <button class="btn" id="btnSkip" title="跳过 (S)">⏭</button>
    </div>

    <!-- 统计 -->
    <div class="stats-row">
      <span>今日 <strong id="statToday">0</strong> 🍅</span>
      <span>总计 <strong id="statTotal">0</strong> 🍅</span>
    </div>

    <div class="shortcut-hint">
      按 <kbd>空格</kbd> 开始/暂停 &nbsp; <kbd>R</kbd> 重置 &nbsp; <kbd>S</kbd> 跳过
    </div>
  </div>

  <!-- 侧边面板 -->
  <div class="side-panel">
    <h3>📋 任务列表</h3>
    <div class="task-input-row">
      <input type="text" id="taskInput" placeholder="添加一个任务..." maxlength="100">
      <button id="btnAddTask">添加</button>
    </div>
    <ul class="task-list" id="taskList"></ul>

    <div class="settings-section">
      <h3>⚙ 时长设置（分钟）</h3>
      <div class="setting-row">
        <span>🎯 专注</span>
        <input type="number" id="setFocus" value="25" min="1" max="120">
      </div>
      <div class="setting-row">
        <span>☕ 短休</span>
        <input type="number" id="setShort" value="5" min="1" max="30">
      </div>
      <div class="setting-row">
        <span>🌿 长休</span>
        <input type="number" id="setLong" value="15" min="1" max="60">
      </div>
    </div>
  </div>
</div>

<script>
// ===== 状态管理 =====
const CIRCUMFERENCE = 2 * Math.PI * 124; // ≈ 779.1

const state = {
  mode: 'focus',           // 'focus' | 'shortBreak' | 'longBreak'
  running: false,
  totalSeconds: 25 * 60,
  remainingSeconds: 25 * 60,
  completedPomodoros: 0,   // 当前轮次中的专注完成数
  intervalId: null,
  audioCtx: null,
};

const durations = {
  focus: 25,
  shortBreak: 5,
  longBreak: 15,
};

const modeNames = {
  focus: '专注',
  shortBreak: '短休',
  longBreak: '长休',
};

const modeColors = {
  focus: 'var(--focus)',
  shortBreak: 'var(--short-break)',
  longBreak: 'var(--long-break)',
};

// ===== DOM 缓存 =====
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

const ringProgress = $('#ringProgress');
const timerDisplay = $('#timerDisplay');
const modeLabel = $('#modeLabel');
const btnPlay = $('#btnPlay');
const themeToggle = $('#themeToggle');
const statToday = $('#statToday');
const statTotal = $('#statTotal');
const taskInput = $('#taskInput');
const taskList = $('#taskList');

// ===== 数据持久化 =====
function loadStats() {
  const raw = localStorage.getItem('pomodoro_stats');
  return raw ? JSON.parse(raw) : { today: 0, total: 0, date: '' };
}

function saveStats(stats) {
  localStorage.setItem('pomodoro_stats', JSON.stringify(stats));
}

function loadTasks() {
  const raw = localStorage.getItem('pomodoro_tasks');
  return raw ? JSON.parse(raw) : [];
}

function saveTasks(tasks) {
  localStorage.setItem('pomodoro_tasks', JSON.stringify(tasks));
}

function loadSettings() {
  const raw = localStorage.getItem('pomodoro_settings');
  if (raw) {
    const s = JSON.parse(raw);
    durations.focus = s.focus || 25;
    durations.shortBreak = s.shortBreak || 5;
    durations.longBreak = s.longBreak || 15;
  }
}

function saveSettings() {
  localStorage.setItem('pomodoro_settings', JSON.stringify(durations));
}

function loadTheme() {
  const t = localStorage.getItem('pomodoro_theme');
  if (t === 'dark') document.body.classList.add('dark');
}

function saveTheme() {
  localStorage.setItem('pomodoro_theme', document.body.classList.contains('dark') ? 'dark' : 'light');
}

// ===== 统计 =====
function getTodayStats() {
  const stats = loadStats();
  const today = new Date().toLocaleDateString('zh-CN');
  if (stats.date !== today) return { today: 0, total: stats.total, date: today };
  return stats;
}

function recordPomodoro() {
  const stats = getTodayStats();
  stats.today++;
  stats.total++;
  saveStats(stats);
  updateStatsDisplay();
}

function updateStatsDisplay() {
  const stats = getTodayStats();
  statToday.textContent = stats.today;
  statTotal.textContent = stats.total;
}

// ===== 计时器逻辑 =====
function setMode(mode) {
  state.mode = mode;
  state.running = false;
  state.totalSeconds = durations[mode] * 60;
  state.remainingSeconds = state.totalSeconds;
  clearInterval(state.intervalId);
  state.intervalId = null;
  updateDisplay();
  updateModeUI();
}

function updateModeUI() {
  $$('.mode-btn').forEach(b => b.classList.remove('active'));
  $(`.mode-btn.${state.mode === 'shortBreak' ? 'short' : state.mode === 'longBreak' ? 'long' : 'focus'}`).classList.add('active');

  ringProgress.style.stroke = modeColors[state.mode];
  btnPlay.className = `btn btn-play ${state.mode === 'shortBreak' ? 'short-bg' : state.mode === 'longBreak' ? 'long-bg' : 'focus-bg'}`;
}

function updateDisplay() {
  const m = Math.floor(state.remainingSeconds / 60);
  const s = state.remainingSeconds % 60;
  timerDisplay.textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;

  const offset = CIRCUMFERENCE * (1 - state.remainingSeconds / state.totalSeconds);
  ringProgress.setAttribute('stroke-dashoffset', offset);

  if (state.running) {
    modeLabel.textContent = `正在${modeNames[state.mode]}...`;
  } else if (state.remainingSeconds !== state.totalSeconds) {
    modeLabel.textContent = '已暂停';
  } else {
    modeLabel.textContent = `准备开始${modeNames[state.mode]}`;
  }
}

function tick() {
  if (state.remainingSeconds <= 0) {
    finishTimer();
    return;
  }
  state.remainingSeconds--;
  updateDisplay();
  document.title = `${timerDisplay.textContent} - ${modeNames[state.mode]} | 番茄钟`;
}

function startTimer() {
  if (state.running) return;
  state.running = true;
  btnPlay.textContent = '⏸';
  updateDisplay();
  state.intervalId = setInterval(tick, 1000);
  document.title = `${timerDisplay.textContent} - ${modeNames[state.mode]} | 番茄钟`;
}

function pauseTimer() {
  state.running = false;
  btnPlay.textContent = '▶';
  clearInterval(state.intervalId);
  state.intervalId = null;
  updateDisplay();
  document.title = '番茄钟';
}

function toggleTimer() {
  if (state.running) {
    pauseTimer();
  } else {
    if (state.remainingSeconds <= 0) resetTimer();
    startTimer();
  }
}

function resetTimer() {
  state.running = false;
  state.totalSeconds = durations[state.mode] * 60;
  state.remainingSeconds = state.totalSeconds;
  clearInterval(state.intervalId);
  state.intervalId = null;
  btnPlay.textContent = '▶';
  updateDisplay();
  updateModeUI();
  document.title = '番茄钟';
}

function skipSession() {
  clearInterval(state.intervalId);
  state.intervalId = null;
  state.running = false;
  btnPlay.textContent = '▶';
  // 跳过时直接切换：专注→短休，休息→专注
  if (state.mode === 'focus') {
    setMode('shortBreak');
  } else {
    setMode('focus');
  }
}

function finishTimer(record = true) {
  clearInterval(state.intervalId);
  state.intervalId = null;
  state.running = false;
  btnPlay.textContent = '▶';

  if (state.mode === 'focus' && record) {
    state.completedPomodoros++;
    recordPomodoro();
  }

  playSound();
  sendNotification();

  // 自动切换模式
  if (state.mode === 'focus') {
    if (state.completedPomodoros % 4 === 0) {
      setMode('longBreak');
    } else {
      setMode('shortBreak');
    }
  } else {
    setMode('focus');
  }

  updateDisplay();
  document.title = '番茄钟';
}

// ===== 音效 =====
function playSound() {
  try {
    if (!state.audioCtx) state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = state.audioCtx;
    const notes = [800, 1000, 1200];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.15);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.15 + 0.3);
      osc.start(ctx.currentTime + i * 0.15);
      osc.stop(ctx.currentTime + i * 0.15 + 0.3);
    });
  } catch (_) { /* 音频不可用时静默处理 */ }
}

// ===== 桌面通知 =====
function sendNotification() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'granted') {
    const title = state.mode === 'focus' ? '🍅 专注时间结束！' : '⏰ 休息时间结束！';
    const body = state.mode === 'focus'
      ? '太棒了！休息一下吧。'
      : '休息好了吗？开始新的专注吧！';
    new Notification(title, { body, icon: '🍅' });
  } else if (Notification.permission !== 'denied') {
    Notification.requestPermission();
  }
}

// ===== 任务管理 =====
function renderTasks() {
  const tasks = loadTasks();
  taskList.innerHTML = tasks.map((t, i) => `
    <li class="task-item ${t.done ? 'completed' : ''}">
      <input type="checkbox" ${t.done ? 'checked' : ''} data-idx="${i}">
      <span>${escapeHtml(t.text)}</span>
      <button class="del-task" data-idx="${i}" title="删除">×</button>
    </li>
  `).join('');
}

function addTask(text) {
  const tasks = loadTasks();
  tasks.push({ text, done: false });
  saveTasks(tasks);
  renderTasks();
}

function toggleTask(idx) {
  const tasks = loadTasks();
  if (tasks[idx]) {
    tasks[idx].done = !tasks[idx].done;
    saveTasks(tasks);
    renderTasks();
  }
}

function deleteTask(idx) {
  const tasks = loadTasks();
  tasks.splice(idx, 1);
  saveTasks(tasks);
  renderTasks();
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ===== 设置 =====
function applySettingsUI() {
  $('#setFocus').value = durations.focus;
  $('#setShort').value = durations.shortBreak;
  $('#setLong').value = durations.longBreak;
}

// ===== 主题 =====
function toggleTheme() {
  document.body.classList.toggle('dark');
  saveTheme();
  themeToggle.textContent = document.body.classList.contains('dark') ? '☾' : '☀';
}

// ===== 初始化 =====
function init() {
  loadSettings();
  loadTheme();
  updateThemeIcon();
  setMode('focus');
  updateStatsDisplay();
  applySettingsUI();
  renderTasks();
  bindEvents();
}

function updateThemeIcon() {
  themeToggle.textContent = document.body.classList.contains('dark') ? '☾' : '☀';
}

function bindEvents() {
  // 模式切换
  $$('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const mode = btn.dataset.mode;
      if (mode === 'shortBreak') setMode('shortBreak');
      else if (mode === 'longBreak') setMode('longBreak');
      else setMode('focus');
    });
  });

  // 主控制
  btnPlay.addEventListener('click', toggleTimer);
  $('#btnReset').addEventListener('click', resetTimer);
  $('#btnSkip').addEventListener('click', skipSession);
  themeToggle.addEventListener('click', toggleTheme);

  // 键盘快捷键
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return; // 不在输入框中响应
    if (e.code === 'Space') { e.preventDefault(); toggleTimer(); }
    if (e.code === 'KeyR') resetTimer();
    if (e.code === 'KeyS') skipSession();
  });

  // 任务
  $('#btnAddTask').addEventListener('click', () => {
    const text = taskInput.value.trim();
    if (text) { addTask(text); taskInput.value = ''; }
  });
  taskInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const text = taskInput.value.trim();
      if (text) { addTask(text); taskInput.value = ''; }
    }
  });
  taskList.addEventListener('click', e => {
    if (e.target.matches('input[type="checkbox"]')) {
      toggleTask(parseInt(e.target.dataset.idx));
    }
    if (e.target.matches('.del-task')) {
      deleteTask(parseInt(e.target.dataset.idx));
    }
  });

  // 设置
  const saveDurations = () => {
    durations.focus = Math.max(1, Math.min(120, parseInt($('#setFocus').value) || 25));
    durations.shortBreak = Math.max(1, Math.min(30, parseInt($('#setShort').value) || 5));
    durations.longBreak = Math.max(1, Math.min(60, parseInt($('#setLong').value) || 15));
    saveSettings();
    applySettingsUI();
    if (!state.running) resetTimer();
  };
  $('#setFocus').addEventListener('change', saveDurations);
  $('#setShort').addEventListener('change', saveDurations);
  $('#setLong').addEventListener('change', saveDurations);
}

// 启动
init();
</script>
</body>
</html>
